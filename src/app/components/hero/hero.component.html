<section class="hero min-h-screen flex items-center justify-center relative overflow-hidden bg-navy pt-24">
  <div class="max-w-7xl mx-auto px-6 lg:px-20 w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative z-10">
    <div class="hero-text text-start" @fadeInUp>
      <h1 class="font-display font-bold text-5xl lg:text-7xl leading-tight mb-6 text-white" @staggerText>
        <span *ngFor="let word of headlineWords" class="inline-block me-3">{{ word }}</span>
      </h1>
      <p class="font-body text-gray text-lg lg:text-xl mb-10 max-w-lg leading-relaxed">
        CODE SQUARE builds custom web applications, mobile apps, and enterprise systems 
        that scale. From concept to production, we're your technical partner.
      </p>
      <button class="cta-primary" (click)="scrollToConsultation()">
        Start Your Project
      </button>
    </div>
    
    <div class="hero-3d relative w-full h-[50vh] lg:h-[80vh] flex justify-center items-center">
      <canvas id="heroCanvas" class="w-full h-full object-contain cursor-move" (mousemove)="onMouseMove($event)"></canvas>
      
      <!-- Glowing background blob -->
      <div class="absolute inset-0 bg-primary/20 blur-[100px] rounded-full -z-10 animate-pulse"></div>
    </div>
  </div>
</section>
