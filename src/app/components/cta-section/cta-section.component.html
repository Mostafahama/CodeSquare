<section class="cta-section py-24 px-6 lg:px-20 bg-navy relative z-10" id="consultation-form">
  <div class="max-w-4xl mx-auto glass-panel p-8 md:p-12 rounded-3xl border border-primary/30">
    <div class="text-center mb-12">
      <h2 class="font-display text-4xl lg:text-5xl font-bold text-white mb-4" @fadeInUp>Ready to Build Something Amazing?</h2>
      <p class="font-body text-gray text-lg" @fadeInUp>
        Let's talk about your project. Book a free 30-minute consultation.
      </p>
    </div>

    <form [formGroup]="consultationForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="form-group flex flex-col gap-2">
          <input formControlName="fullName" type="text" placeholder="Full Name" class="form-input text-white">
          <span *ngIf="consultationForm.get('fullName')?.invalid && consultationForm.get('fullName')?.touched" class="text-accent text-sm">
            Name is required (min 2 characters)
          </span>
        </div>

        <div class="form-group flex flex-col gap-2">
          <input formControlName="email" type="email" placeholder="Email Address" class="form-input text-white">
          <span *ngIf="consultationForm.get('email')?.invalid && consultationForm.get('email')?.touched" class="text-accent text-sm">
            Valid email is required
          </span>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="form-group flex flex-col gap-2">
          <input formControlName="phone" type="tel" placeholder="Phone (Optional)" class="form-input text-white">
        </div>

        <div class="form-group flex flex-col gap-2">
          <select formControlName="projectType" class="form-input text-gray">
            <option value="" disabled>Select Project Type</option>
            <option value="web">Web Application</option>
            <option value="mobile">Mobile App</option>
            <option value="custom">Custom System</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="form-group flex flex-col gap-2">
          <select formControlName="budget" class="form-input text-gray">
            <option value="" disabled>Budget Range</option>
            <option value="<5k">Less than $5,000</option>
            <option value="5k-15k">$5,000 - $15,000</option>
            <option value="15k-50k">$15,000 - $50,000</option>
            <option value=">50k">More than $50,000</option>
          </select>
        </div>

        <div class="form-group flex flex-col gap-2">
          <select formControlName="timeline" class="form-input text-gray">
            <option value="" disabled>Timeline</option>
            <option value="asap">ASAP</option>
            <option value="1-3m">1-3 months</option>
            <option value="3-6m">3-6 months</option>
            <option value="flexible">Flexible</option>
          </select>
        </div>
      </div>

      <div class="form-group flex flex-col gap-2">
        <textarea formControlName="description" placeholder="Tell us about your project..." rows="5" class="form-input text-white"></textarea>
        <span *ngIf="consultationForm.get('description')?.invalid && consultationForm.get('description')?.touched" class="text-accent text-sm">
          Description is required (min 10 characters)
        </span>
      </div>

      <button type="submit" class="cta-primary mt-4 disabled:opacity-50 disabled:cursor-not-allowed" [disabled]="!consultationForm.valid || isSubmitting">
        {{ isSubmitting ? 'Sending...' : 'Schedule Consultation' }}
      </button>

    </form>

    <div *ngIf="submitMessage" class="mt-6 p-4 rounded-lg text-center"
         [ngClass]="submitStatus === 'success' ? 'bg-primary/20 text-white border border-primary' : 'bg-accent/20 text-white border border-accent'">
      {{ submitMessage }}
    </div>
  </div>
</section>
